<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Register - NutriTrack Cloud</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='design.css') }}">
</head>

<body>

    <h1>Create an Account</h1>
    <p>Create your NutriTrack Cloud account.</p>

    {% if errors %}
    <div class="error-box">
        {% for error in errors %}
        <p>{{ error }}</p>
        {% endfor %}
    </div>
    {% endif %}

    <form method="POST">

        <h3>Username</h3>
        <input
            type="text"
            name="username"
            required
        >

        <h3>Email</h3>
        <input
            type="email"
            name="email"
            required
        >

        <h3>Password</h3>
        <input
            type="password"
            name="password"
            minlength="8"
            required
        >

        <h3>Confirm Password</h3>
        <input
            type="password"
            name="confirm_password"
            minlength="8"
            required
        >

        <button type="submit">
            Register
        </button>

        <p class="form-message">
            Already have an account?
            <a href="{{ url_for('login') }}">
                Login
            </a>
        </p>

    </form>

</body>

</html>

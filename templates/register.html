<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register - NutriTrack Cloud</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='design.css') }}">

</head>

<body class="auth-page">

    <main class="auth-wrapper">

        <section class="auth-card" aria-labelledby="register-title">

            <div class="auth-icon" aria-hidden="true">🥗</div>

            <h1 id="register-title">Create an Account</h1>

            <p class="auth-description">
                Create your NutriTrack Cloud account to start tracking your nutrition.
            </p>

            {% if errors %}
            <div class="error-box" role="alert">
                {% for error in errors %}
                <p>{{ error }}</p>
                {% endfor %}
            </div>
            {% endif %}

            <form method="POST" class="auth-form">

                <div class="form-group">
                    <label for="username">Username</label>

                    <input id="username" type="text" name="username" value="{{ request.form.get('username', '') }}"
                        maxlength="50" autocomplete="username" required autofocus>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>

                    <input id="email" type="email" name="email" value="{{ request.form.get('email', '') }}"
                        autocomplete="email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>

                    <input id="password" type="password" name="password" minlength="8" autocomplete="new-password"
                        required>
                </div>

                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>

                    <input id="confirm_password" type="password" name="confirm_password" minlength="8"
                        autocomplete="new-password" required>
                </div>

                <button type="submit" class="auth-button">
                    Register
                </button>

                <p class="form-message">
                    Already have an account?
                    <a href="{{ url_for('login') }}">
                        Login
                    </a>
                </p>

                <p class="form-message">
                    <a href="{{ url_for('landing') }}">
                        Back to home
                    </a>
                </p>

            </form>

        </section>

    </main>
    <script src="{{ url_for('static', filename='form-validation.js') }}"></script>
    <script src="{{ url_for('static', filename='site-interactions.js') }}"></script>

</body>

</html>
